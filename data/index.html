      .vertical-progress-container {
  width: 50px; /* Adjust width as needed */
  height: 300px; /* Adjust height as needed */
  background-color: #e0e0e0;
  border-radius: 5px;
  position: relative;
  overflow: hidden; /* Ensures the fill stays within the container */

}

.outlined-label {
  outline: 2px solid black; /* Sets a 2px solid blue outline */
  outline-offset: 5px;   /* Adds a 5px offset between the label and the outline */
}
.auto_margin{
  margin-left: auto;
  margin-right: auto;
}

.vertical-progress-fill {
  background-color: #4CAF50; /* Green fill color */
  width: 100%;
  position: absolute;
  bottom: 0; /* Starts filling from the bottom */
  transition: height 0.5s ease; /* Smooth animation for height changes */
}

.progress-label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #333;
  font-family: sans-serif;
  font-weight: bold;
  font-size: 14px;
}
.center-cell {

  border: 2px solid white;
  border-radius: 5px;
  font-family:monospace, monospace;
  display: inline-block;
  min-width: 132px;

}

<script>


var alertPercent_1 = 20;
var alertPercent_2 = 20;
var alarmEnabled = 0;
var alarmSilenced = false;
var timerA;
var settingsJson;
var dualMode = false;
var showCounter = false;


function resetAlarm(){
   const btn = document.getElementById("silenceAlarmButton");
   btn.value = "Suppress Alarm";
   alarmSilenced = false;
  
}

function get_date(){
  let ms = new Date(Date.now());
  day = ms.getDate();
  month = ms.getMonth() + 1;
  year = ms.getFullYear();
  return String( month) + "/" + String(day) + "/" + String(year);

}








function updateProgressBar(percentage, barID, backColor) {
    const parentElement = document.getElementById(barID);
    const childElements = parentElement.children;
    // You can iterate through the collection
    const fill = childElements[0];
  // const fill = document.querySelector('#' + barID + '.first');
    const label = childElements[1]
  // const label = document.querySelector('#' + barID + '.progress-label');
  
  fill.style.height = percentage + '%';
  fill.style.backgroundColor  = backColor;
  label.innerHTML = percentage + '%';
}

// Example usage:
// updateProgressBar(75); // Sets progress to 75%


function updateBars(){
  var xhttp = new XMLHttpRequest();
    xhttp.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
      container = document.getElementById("mainFieldSet");
      valuesJson = JSON.parse(this.responseText);
      const btn = document.getElementById("silenceAlarmButton");
      if (valuesJson.isAlarmed == true){
        document.getElementById("mainFieldSet").style = 'background: linear-gradient(131deg,rgba(255, 0, 0, 1) 0%, rgba(102, 21, 29, 1) 100%);'      
      } else {
        document.getElementById("mainFieldSet").style = "";
      }
      if ((alarmEnabled == true) && (valuesJson.isAlarmed == true) && (valuesJson.isAlarmSilenced == false)){
        btn.hidden = false;
      } else {
        btn.hidden = true;
      }
      if (showCounter == true){
        document.getElementById("CounterValue").textContent  = padCounter(valuesJson.currentCounter);
        document.getElementById("rnds").hidden = false;
        document.getElementById("CounterValue").hidden = false;
      } else {
        document.getElementById("rnds").hidden = true;
        document.getElementById("CounterValue").hidden = true;
      }
        
          let p1 = valuesJson.pValue;
                   
          if (p1 < 0) p1 = 0;
          if (p1 < alertPercent_1) {
            updateProgressBar(p1, 'powderBar', 'red'); // Sets progress to 75%
            const label = document.getElementById("powderLabel");
            label.style.color = "red";
            
            if (alarmEnabled == 1 && alarmSilenced == false){
              
            }
          } else if (p1 < alertPercent_1 * 1.5){
            updateProgressBar(p1, 'powderBar', 'darkorange'); // Sets progress to 75%
            const label = document.getElementById("powderLabel");
            label.style.color = "darkorange";
            
          }
          else {
            updateProgressBar(p1, 'powderBar', '#4CAF50'); // Sets progress to 75%
            const label = document.getElementById("powderLabel");
            label.style.color = "black";
            resetAlarm();
           }

          if(dualMode == true) {
            let p2 = valuesJson.sValue;
            if (p2 < 0) p2 = 0;
            if (p2 < alertPercent_2) {
              updateProgressBar(p2, 'shotBar', 'red'); // Sets progress to 75%
              const label = document.getElementById("shotLabel");
              label.style.color = "red";
              if (alarmEnabled == 1 && alarmSilenced == false){
              
              }
            } else {
              updateProgressBar(p2, 'shotBar', '#4CAF50'); // Sets progress to 75%
              const label = document.getElementById("shotLabel");
              label.style.color = "black";
              // To stop the audio and reset its playhead to the beginning
              // beep_audio.pause();
              // beep_audio.currentTime = 0;
              resetAlarm();
            }

          }

      }
     };
     xhttp.open("GET", "/get_values", true);
     xhttp.send();

}






const fastInterval = setInterval(function ( ) {
  updateBars();
     
  }, 500 ) ;

    getRssi();

  function restCounter(){
    var xhttp = new XMLHttpRequest();
    xhttp.onreadystatechange = function() {
    };
  xhttp.open("GET", "/resetCounter", true);
  xhttp.send();

  }

  function padCounter(Count){
  outString = "";
  if (Count < 10) outString +="0";
  if (Count < 100) outString +="0";
  if (Count < 1000) outString +="0";
  if (Count < 10000) outString +="0";
  outString += String(Count);
  return outString;
}


  
function getSettings(){
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
 

    if (this.readyState == 4 && this.status == 200) {
      settingsJson = JSON.parse(this.responseText);
      document.getElementById("device-name-label").innerHTML = settingsJson.device_name;
      alertPercent_1 = settingsJson.alertPercent_1;
      alertPercent_2 = settingsJson.alertPercent_2;
      alarmEnabled = settingsJson.alarmEnabled;
    
      showCounter = settingsJson.showCounter;
      dualMode = settingsJson.dualMode;
      pbar = document.getElementById("shotbar_td");
      plabel = document.getElementById("shotLabel")
      if(dualMode == true){
        pbar.style.display = "block";
        plabel.style.display = "block";
      } else {
        pbar.style.display = "none";
        plabel.style.display = "none";
      }

    }
  };
  xhttp.open("GET", "/get_settings", true);
  xhttp.send();

}


  function stopIntervals(){
    clearInterval(fastInterval);
    clearInterval(slowInterval);
  }

 















</script>

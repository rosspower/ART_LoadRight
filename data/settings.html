function isMobileMediaQuery() {
  return window.matchMedia("(max-width: 767px)").matches; // Example for screens less than 768px wide
}

function click_loader(){
  
  const elements = document.querySelectorAll('.data-field');
  // Using forEach (more concise)
  elements.forEach(element => {
      element.addEventListener('click', function(event) {
          var title = element.parentElement.querySelector('.click-title');
          if (title){
            if(title.length){
              const newSpan = document.createElement('span');
              newSpan.classList.add('click-title');
              newSpan.textContent = element.title;
              element.parentElement.appendChild(newSpan);
            } else {
              title.remove();
            }
          } else {
            const newSpan = document.createElement('span');
            newSpan.classList.add('click-title');
            newSpan.textContent = element.title;
            element.parentElement.appendChild(newSpan);
          }
      
        
      });
      element.addEventListener('focus', () => {
        originalValue = element.value;
      });
      element.addEventListener('blur', () => {
        var title = element.parentElement.querySelector('.click-title');
        if (title){
          if(title.length){
          } else {
            title.remove();
          }
        }
      });

  });

}


window.addEventListener("load", (event) => {
  getSettings();
  if (isMobileMediaQuery() == true){

});

function getDateTime(){
    var xhttp = new XMLHttpRequest();
    xhttp.onreadystatechange = function() {
      if (this.readyState == 4 && this.status == 200) {
        let dTime = this.responseText;
        //do this to adjust for the "local timezone offest"
        dTime = dTime + "+00:00";
        var now = new Date(Date.parse(dTime));
          
        document.getElementById('date_time').value = now.toISOString().slice(0,16);
      }
    };
    xhttp.open("GET", "/get_time", true);
    xhttp.send();
}




function getSettings(){
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
 

    if (this.readyState == 4 && this.status == 200) {
      let settingsJson = JSON.parse(this.responseText);
      console.log(settingsJson);
      document.getElementById("device-name-label").innerHTML = settingsJson.device_name;
      document.getElementById("deviceName").value = settingsJson.device_name;
      document.getElementById("deviceDesc").value = settingsJson.device_desc;
      document.getElementById("mdns_name").value = settingsJson.mdns_name;
      document.getElementById("can_speed").value = settingsJson.can_speed;
      document.getElementById("logging_interval").value = settingsJson.log_interval;
      document.getElementById("udcd_version").value = settingsJson.UDCD_version;
      document.getElementById("ip_address").value = settingsJson.ip_address;
      
      const selectElement = document.getElementById('select_wifi_mode');
      var wifiMode = settingsJson.wifi_mode;
      selectElement.value = wifiMode;
   
    }
  };
  xhttp.open("GET", "/get_settings", true);
  xhttp.send();

}

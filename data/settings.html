            <fieldset>
                <legend>Alert Settings:</legend>

                    <tr><td>Powder Alert Percentage:</td><td><input type="text" id="alertPercent_1" name="alertPercent_1" maxlength="25" title="Max length 25" onchange="addclasser(this)"></td></tr>

                          <option value="0">Disabled</option>
                        </select>  
                      </td>
                    </tr>
                </table>
                 
                
            </fieldset>
             <fieldset style="position: relative;">
            <legend>Wifi Mode:</legend>

            <select id="select_wifi_mode" name="wifi_mode" title="how the Device connects" class="data-field" style = "background-color: white; max-width: 150px;" onchange="addclasser(this)">
              <!-- <option value="0">None</option> -->
              <option value="1">Connected</option>
              <option value="2">StandAlone(AP Mode)</option>
            </select>
          </fieldset>
            <fieldset>
              <legend>mDns Name</legend>
                <div>
                  <input type="text" id="mdns_name" name="mdns_name" maxlength="25" title="Max length 25" onchange="addclasser(this)">
                </div>
            </fieldset>
            <fieldset id="last_div">
              <input class="favorite styled" type="button" value="Reset Wi-Fi" style="margin-left: 10px;" onclick="wifiReset()" />
              <input class="favorite styled" style="float: right;" type="submit" value="Save Settings">
            </fieldset>
          
        </form>

              <br/>
              Settings</button>

}

function addclasser(element){
    element.className += " changed";
    console.log("added") 
}



    

function wifiReset(){
    let answer = confirm("This will clear all your Wifi settings\nPress OK to Reset/Clear Wifi Settings\n if changing the mDns name, press Cancel and Save Settings");
    if (answer == true){
        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
            }
        };
        xhttp.open("GET", "/wifi-reset", true);
        xhttp.send();
    }

    
} 


function getSettings(){
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
 

    if (this.readyState == 4 && this.status == 200) {
      let settingsJson = JSON.parse(this.responseText);
      console.log(settingsJson);
      document.getElementById("device-name-label").innerHTML = settingsJson.device_name;
      document.getElementById("deviceName").value = settingsJson.device_name;
      document.getElementById("deviceDesc").value = settingsJson.device_desc;
      document.getElementById("mdns_name").value = settingsJson.mdns_name;

      document.getElementById("alertPercent_1").value = settingsJson.alertPercent_1;
      document.getElementById("alertPercent_2").value = settingsJson.alertPercent_2
         
      const selectElement = document.getElementById('select_wifi_mode');
      var wifiMode = settingsJson.wifi_mode;
      selectElement.value = wifiMode;

      const selectAlarmElement = document.getElementById('select_alarm_enabled');
      var alarmEnabled = settingsJson.alarmEnabled;
      if (alarmEnabled == true){
        selectAlarmElement.selectedIndex = 0;
      } else {
        selectAlarmElement.selectedIndex = 1;
      }
      
   
    }
  };
  xhttp.open("GET", "/get_settings", true);
  xhttp.send();

}

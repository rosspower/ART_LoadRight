<script>

  var settingsJson;
  var infoJson;

  



  window.addEventListener("load", (event) => {
    //getSettings();
    //getInfo();
  });

function getInfo(){
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
      infoJson = JSON.parse(this.responseText);
      console.log(infoJson);
      build_info_fields();
      
    }
  };
  xhttp.open("GET", "/get_device_info", true);
  xhttp.send();

}  

  
function getSettings(){
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
      settingsJson = JSON.parse(this.responseText);
      console.log(settingsJson);
      document.getElementById("device-name-label").innerHTML = settingsJson.device_name;
    }
  };
  xhttp.open("GET", "/get_settings", true);
  xhttp.send();

}

function read_info(){
   var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
    window.location.reload();
   
  };
  xhttp.open("GET", "/read_info", true);
  xhttp.send();

}

function build_info_fields(){
  const params_table = document.getElementById("device_info_table"); 
// <tr><td>Device Name:</td><td><input type="text" id="deviceName" readonly></td></tr>
  for (let i = 0; i < infoJson.length; i++) {
    const newRow = document.createElement("tr");
    const cell1 = document.createElement("td");
    const cell2 = document.createElement("td");
    cell2.style.position = "relative";
    const cell3 = document.createElement("td");

    cell1.innerHTML = infoJson[i].label
    cell2.innerHTML = "<input type='text' class='data-field' style = ' max-width: 150px;' value ='" + infoJson[i].value + "' id='data" + i + "' name = '" + infoJson[i].label + "' readonly >";
    newRow.appendChild(cell1);
    newRow.appendChild(cell2);
    params_table.appendChild(newRow);
  }
  
}

  function stopIntervals(){
    clearInterval(fastInterval);
    clearInterval(slowInterval);
  }

</script>
